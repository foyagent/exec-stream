<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Exec Stream - OpenClaw 命令监控</title>
  <style>
    :root {
      --bg: #1e1e1e;
      --bg-elevated: #252526;
      --panel: #2d2d2d;
      --panel-hover: #3a3a3a;
      --border: #3e3e42;
      --text: #d4d4d4;
      --muted: #858585;
      --accent: #4ec9b0;
      --primary: #0e639c;
      --primary-hover: #1177bb;
      --danger: #f48771;
      --success: #89d185;
      --shadow: rgba(0, 0, 0, 0.28);
    }

    :root[data-theme="light"] {
      --bg: #ffffff;
      --bg-elevated: #f7f7f7;
      --panel: #f3f3f3;
      --panel-hover: #e8e8e8;
      --border: #d9d9d9;
      --text: #1e1e1e;
      --muted: #666666;
      --accent: #0f7b6c;
      --primary: #0e639c;
      --primary-hover: #1177bb;
      --danger: #c93c2f;
      --success: #2f855a;
      --shadow: rgba(0, 0, 0, 0.12);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Monaco', 'Menlo', 'Ubuntu Mono', monospace;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      flex-direction: column;
      transition: background 0.2s ease, color 0.2s ease;
    }

    .header {
      background: var(--panel);
      padding: 12px 20px 10px;
      border-bottom: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      gap: 12px;
      transition: background 0.2s ease, border-color 0.2s ease;
    }

    .header-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
    }

    .header h1 {
      font-size: 16px;
      color: var(--accent);
      white-space: nowrap;
    }

    .header-actions {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    button,
    input {
      font-family: inherit;
    }

    button {
      cursor: pointer;
      transition: background 0.2s ease, border-color 0.2s ease, color 0.2s ease, opacity 0.2s ease;
    }

    .history-btn {
      background: var(--primary);
      color: #fff;
      border: none;
      padding: 6px 12px;
      border-radius: 4px;
      font-size: 13px;
    }

    .history-btn:hover,
    .copy-btn:hover {
      background: var(--primary-hover);
    }

    .theme-btn,
    .lang-btn,
    .tab-add-btn {
      min-width: 44px;
      background: var(--bg-elevated);
      color: var(--text);
      border: 1px solid var(--border);
      padding: 6px 12px;
      border-radius: 8px;
      font-size: 13px;
    }

    .theme-btn:hover,
    .lang-btn:hover,
    .toggle-btn:hover,
    .tab-add-btn:hover,
    .tab-button:hover,
    .tab-close:hover {
      background: var(--panel-hover);
    }

    .status {
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--muted);
      font-size: 12px;
      min-width: 98px;
      justify-content: flex-end;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--danger);
    }

    .status-dot.connected { background: var(--success); }
    .status-dot.waiting { background: #e2c08d; }

    .tabs-bar {
      display: flex;
      align-items: center;
      gap: 10px;
      min-height: 42px;
    }

    .tabs-list {
      display: flex;
      gap: 10px;
      overflow-x: auto;
      padding-bottom: 4px;
      flex: 1;
      scrollbar-width: thin;
    }

    .tab-item {
      display: inline-flex;
      align-items: center;
      min-width: 0;
      border: 1px solid var(--border);
      background: var(--bg-elevated);
      border-radius: 10px;
      box-shadow: 0 6px 18px rgba(0, 0, 0, 0.08);
      transition: transform 0.15s ease, border-color 0.2s ease, background 0.2s ease;
    }

    .tab-item:hover {
      transform: translateY(-1px);
    }

    .tab-item.active {
      border-color: var(--accent);
      background: rgba(78, 201, 176, 0.14);
    }

    :root[data-theme="light"] .tab-item.active {
      background: rgba(15, 123, 108, 0.12);
    }

    .tab-button {
      max-width: 220px;
      border: none;
      background: transparent;
      color: var(--text);
      padding: 9px 12px;
      border-radius: 10px 0 0 10px;
      display: inline-flex;
      align-items: center;
      min-width: 0;
    }

    .tab-name {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      user-select: none;
    }

    .tab-input {
      width: 160px;
      max-width: 100%;
      background: transparent;
      color: var(--text);
      border: none;
      outline: none;
      font-size: 13px;
    }

    .tab-close {
      border: none;
      background: transparent;
      color: var(--muted);
      width: 28px;
      height: 28px;
      margin-right: 6px;
      border-radius: 999px;
      font-size: 18px;
      line-height: 1;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .tab-close:hover {
      color: var(--danger);
    }

    .auth-container {
      display: none;
      align-items: center;
      justify-content: center;
      background: var(--bg);
      padding: 24px;
      border-bottom: 1px solid var(--border);
    }

    .auth-box {
      width: min(520px, 100%);
      background: var(--panel);
      padding: 32px;
      border-radius: 12px;
      text-align: center;
      box-shadow: 0 10px 30px var(--shadow);
      border: 1px solid var(--border);
    }

    .auth-title {
      font-size: 18px;
      color: var(--accent);
      margin-bottom: 20px;
    }

    .auth-code {
      font-size: clamp(36px, 8vw, 52px);
      font-weight: bold;
      color: var(--text);
      letter-spacing: 8px;
      margin: 24px 0;
      font-family: 'Monaco', 'Menlo', monospace;
    }

    .auth-hint {
      color: var(--muted);
      font-size: 13px;
      margin-top: 16px;
      line-height: 1.6;
    }

    .copy-btn {
      background: var(--primary);
      color: #fff;
      border: none;
      padding: 10px 24px;
      border-radius: 4px;
      font-size: 14px;
      margin-top: 16px;
    }

    .terminal {
      flex: 1;
      padding: 20px;
      overflow-y: auto;
      font-size: 13px;
      line-height: 1.6;
      background: var(--bg);
    }

    .command {
      color: var(--accent);
      margin-bottom: 4px;
      word-break: break-word;
    }

    .output {
      color: var(--text);
      white-space: pre-wrap;
      margin-bottom: 16px;
      word-break: break-word;
    }

    .output.error { color: var(--danger); }

    .output-container {
      margin-bottom: 16px;
    }

    .collapsible {
      position: relative;
      transition: max-height 0.25s ease;
    }

    .collapsible.collapsed::after {
      content: '';
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      height: 36px;
      background: linear-gradient(to bottom, rgba(0, 0, 0, 0), var(--bg));
      pointer-events: none;
    }

    :root[data-theme="light"] .collapsible.collapsed::after {
      background: linear-gradient(to bottom, rgba(255, 255, 255, 0), var(--bg));
    }

    .toggle-btn {
      background: var(--bg-elevated);
      color: var(--muted);
      border: 1px solid var(--border);
      padding: 4px 8px;
      border-radius: 4px;
      font-size: 11px;
      margin-top: 4px;
    }

    .meta {
      color: var(--muted);
      font-size: 11px;
      margin-bottom: 8px;
    }

    .empty-state {
      padding: 16px 0;
    }

    @media (max-width: 900px) {
      .header-top {
        flex-direction: column;
        align-items: stretch;
      }

      .header-actions {
        justify-content: space-between;
      }
    }

    @media (max-width: 640px) {
      .header {
        padding: 10px 12px 8px;
      }

      .tabs-bar {
        align-items: stretch;
        flex-direction: column;
      }

      .tabs-list {
        width: 100%;
      }

      .tab-item {
        min-width: 160px;
      }

      .tab-button {
        max-width: none;
        flex: 1;
      }

      .tab-add-btn {
        width: 100%;
      }

      .terminal {
        padding: 14px 12px 20px;
      }

      .auth-box {
        padding: 24px 18px;
      }
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="header-top">
      <h1>🖥️ Exec Stream</h1>
      <div class="header-actions">
        <button class="history-btn" id="historyBtn" onclick="loadHistory()">📜 历史命令</button>
        <button class="theme-btn" id="themeBtn" onclick="toggleTheme()">☀️</button>
        <button class="lang-btn" id="langBtn" onclick="toggleLang()">EN</button>
        <div class="status">
          <div class="status-dot" id="statusDot"></div>
          <span id="statusText">未连接</span>
        </div>
      </div>
    </div>

    <div class="tabs-bar">
      <div class="tabs-list" id="tabList"></div>
      <button class="tab-add-btn" id="addTabBtn" type="button">+ 新建</button>
    </div>
  </div>

  <div class="auth-container" id="authContainer">
    <div class="auth-box">
      <div class="auth-title" id="authTitle">请授权访问</div>
      <div class="auth-code" id="authCode">------</div>
      <button class="copy-btn" id="copyBtn" type="button" onclick="copyAuthCode()">📋 复制授权口令</button>
      <div class="auth-hint" id="authHint">将授权口令发送给 OpenClaw 完成授权</div>
    </div>
  </div>

  <div class="terminal" id="terminal"></div>

  <script src="pako_inflate.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
